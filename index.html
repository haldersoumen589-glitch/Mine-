<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise</title>
<style>
body{
margin:0;height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
font-family:Segoe UI,sans-serif;overflow:hidden}
.card{
background:rgba(255,255,255,.18);backdrop-filter:blur(12px);
padding:40px;border-radius:30px;text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.2)}
h1{color:#fff;font-size:2.3rem}
p{color:#fff}
button{
padding:16px 38px;border:none;border-radius:50px;
font-size:1.1rem;cursor:pointer;
background:#fff;color:#e75480;
box-shadow:0 0 25px rgba(255,255,255,.8);
transition:.3s}
button:hover{transform:scale(1.08)}
</style>
</head>
<body>
<div class="card">
<h1>Someone Special Has A Surprise ✨</h1>
<p>Click the button and discover it.</p>
<button onclick="location.href='surprise.html'">Open Surprise 🎁</button>
</div>
</body>
</html>
